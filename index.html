<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gas Town Arcade</title>
    <style>
      @font-face {
        font-family: 'ArkPixel';
        src: url('/src/fonts/ark-pixel-12px-latin.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #1a1a2e;
        font-family: 'ArkPixel', 'Courier New', monospace;
        image-rendering: pixelated;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0e1119; }
      ::-webkit-scrollbar-thumb { background: #3a3a5e; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #5a5a7e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
